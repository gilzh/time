<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vintage Stopwatch</title>
<meta property="og:title" content="Vintage Stopwatch" />
<meta property="og:description" content="A vintage mechanical stopwatch" />
<meta property="og:image" content="https://gilzh.github.io/stop/og-image.png" />
<meta property="og:url" content="https://gilzh.github.io/stop/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://gilzh.github.io/stop/og-image.png" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1008;
    background-image: radial-gradient(ellipse at center, #2d1f0e 0%, #0e0804 100%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .watch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .page-title {
    color: #c8a96e;
    font-family: 'Georgia', serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    opacity: 0.85;
    line-height: 1.6;
  }
  .page-subtitle {
    color: #8b6914;
    font-family: 'Georgia', serif;
    font-size: 18px;
    font-style: italic;
    letter-spacing: 1px;
    text-align: center;
    opacity: 0.75;
    margin-top: -20px;
    margin-bottom: 16px;
  }

  /* Crown / Start button at top */
  .btn-top {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 28px;
    border-radius: 6px 6px 3px 3px;
    background: linear-gradient(to bottom, #c8a96e, #8b6914, #c8a96e, #7a5c10);
    border: none;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
    z-index: 10;
  }
  .btn-top::after {
    content: '';
    position: absolute;
    top: 4px; left: 6px; right: 6px; bottom: 4px;
    background: repeating-linear-gradient(
      to right,
      transparent, transparent 4px,
      rgba(0,0,0,0.3) 4px, rgba(0,0,0,0.3) 5px
    );
    border-radius: 3px;
    pointer-events: none;
  }
  .btn-top:active { transform: translateX(-50%) translateY(3px); }

  /* Side Reset button */
  .side-buttons {
    position: absolute;
    right: -30px;
    top: 50%;
    transform: translateY(-50%);
  }
  .btn-side {
    width: 26px;
    height: 40px;
    background: linear-gradient(to right, #b8922e, #8b6914, #c8a96e);
    border-radius: 6px;
    border: none;
    cursor: pointer;
    box-shadow: 3px 3px 8px rgba(0,0,0,0.6), inset -1px 0 0 rgba(255,255,255,0.15);
    transition: transform 0.1s;
  }
  .btn-side:active { transform: translateX(3px); }

  /* Outer case */
  .watch-outer {
    position: relative;
    width: 360px;
    height: 360px;
    border-radius: 50%;
    background: linear-gradient(145deg, #d4aa50 0%, #8b6914 30%, #c8a030 55%, #7a5c10 75%, #b8922e 100%);
    box-shadow:
      0 0 0 4px #5a4010,
      0 12px 50px rgba(0,0,0,0.85),
      0 4px 12px rgba(0,0,0,0.5),
      inset 0 3px 6px rgba(255,220,100,0.3),
      inset 0 -3px 6px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .watch-outer::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 3px solid rgba(100, 70, 10, 0.8);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
  }

  /* Inner bezel */
  .watch-bezel {
    position: relative;
    width: 314px;
    height: 314px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 50%, #0e0804 100%);
    box-shadow:
      inset 0 6px 16px rgba(0,0,0,0.9),
      inset 0 -3px 8px rgba(0,0,0,0.6),
      0 0 0 3px #5a4010;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Dial face */
  .watch-face {
    position: relative;
    width: 290px;
    height: 290px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 40% 35%, rgba(255,245,220,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at center, #f5edd8 0%, #e8d9b8 40%, #d4c090 70%, #c8aa70 100%);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), inset 0 -2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .watch-face::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,200,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    border-radius: 50%;
  }

  /* Digital readout */
  .digital-display {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 12, 4, 0.88);
    border: 1.5px solid #8b6914;
    border-radius: 6px;
    padding: 5px 14px;
    color: #d4aa50;
    font-family: 'Courier New', monospace;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 3px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    white-space: nowrap;
    z-index: 10;
  }

  /* Brand */
  .brand {
    position: absolute;
    top: 76px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 6px;
    color: #8b6914;
    font-family: 'Georgia', serif;
    text-transform: uppercase;
    z-index: 10;
  }

  /* Bottom controls */
  .controls {
    display: flex;
    gap: 32px;
    align-items: center;
  }

  .btn {
    width: 110px;
    height: 54px;
    border-radius: 27px;
    border: none;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 18px;
    letter-spacing: 1px;
    transition: all 0.15s;
  }

  .btn-start {
    background: linear-gradient(to bottom, #c8a96e, #8b6914, #7a5c10);
    color: #fff8e8;
    box-shadow: 0 5px 16px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,220,100,0.3);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .btn-start:active { transform: translateY(2px); }

  .btn-reset {
    background: linear-gradient(to bottom, #5a4535, #2d1f0e, #1a1008);
    color: #c8a96e;
    border: 1.5px solid #8b6914;
    box-shadow: 0 5px 16px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,180,50,0.1);
  }
  .btn-reset:active { transform: translateY(2px); }

  /* Time limit input */
  .limit-row {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #8b6914;
    letter-spacing: 2px;
  }
  .limit-input {
    width: 70px;
    height: 44px;
    background: rgba(20, 12, 4, 0.9);
    border: 1.5px solid #8b6914;
    border-radius: 6px;
    color: #d4aa50;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    text-align: center;
    outline: none;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.8);
  }
  .limit-input:focus { border-color: #c8a96e; }
  .limit-input::placeholder { color: #5a4010; font-size: 14px; }
  .limit-label { text-transform: uppercase; letter-spacing: 3px; font-size: 14px; }
  .footer-link {
    color: #5a4010;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-decoration: none;
    opacity: 0.7;
  }
  .footer-link:hover { opacity: 1; color: #8b6914; }
</style>
</head>
<body>

<div class="watch-container">
  <h1 class="page-title">Alicia &amp; Alice Timepiece</h1>
  <p class="page-subtitle" id="tagline"></p>
  <div class="watch-outer">
    <button class="btn-top" id="btnSideReset" title="Reset"></button>
    <div class="side-buttons">
      <button class="btn-side" id="btnSideStart" title="Start/Stop"></button>
    </div>
    <div class="watch-bezel">
      <div class="watch-face">
        <canvas id="dialCanvas" width="290" height="290"></canvas>
        <div class="brand">Tempus &middot; Co.</div>
        <div class="digital-display" id="digitalDisplay">00:00</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-reset" id="btnReset">Reset</button>
    <button class="btn btn-start" id="btnStart">Start</button>
  </div>

  <div class="limit-row">
    <span class="limit-label">Target</span>
    <input class="limit-input" id="limitInput" type="number" min="1" max="10" placeholder="—" />
    <span class="limit-label">min</span>
  </div>
  <a class="footer-link" href="https://gilzh.github.io" target="_blank">gilzh.github.io</a>
</div>

<script>
const canvas = document.getElementById('dialCanvas');
const ctx = canvas.getContext('2d');
const CX = 145, CY = 145, R = 133;

let startTime = null;
let elapsed = 0;
let running = false;
let animFrame = null;
let limitMin = null;

document.getElementById('limitInput').addEventListener('input', function() {
  const v = parseInt(this.value);
  limitMin = (v >= 1 && v <= 10) ? v : null;
  drawDial(elapsed);
});

function formatTime(ms) {
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

const SCALE = 10; // dial shows 0–20 minutes

function drawDial(ms) {
  ctx.clearRect(0, 0, 290, 290);

  const totalMin = ms / 60000;
  const totalSec = ms / 1000;

  if (limitMin !== null) drawLimitMarker(limitMin);

  drawMinuteTicks();
  drawSecondTicks();

  // Minute hand — full sweep = SCALE minutes
  const minAngle = (totalMin % SCALE) / SCALE * Math.PI * 2;
  drawHand(minAngle, R * 0.62, 9, '#1a0e04');

  // Second hand
  const secAngle = (totalSec % 60) / 60 * Math.PI * 2;
  drawSecondHand(secAngle);

  // Center jewel
  ctx.beginPath(); ctx.arc(CX, CY, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#c8a96e'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX, CY, 4.5, 0, Math.PI * 2);
  ctx.fillStyle = '#8b6914'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX, CY, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd060'; ctx.fill();
}

function drawLimitMarker(min) {
  // clamp to scale
  const clamped = Math.min(min, SCALE);
  const angle = (clamped / SCALE) * Math.PI * 2 - Math.PI / 2;
  const arcSpan = (0.5 / SCALE) * Math.PI * 2;

  ctx.beginPath();
  ctx.arc(CX, CY, R - 5, angle - arcSpan / 2, angle + arcSpan / 2);
  ctx.arc(CX, CY, R - 20, angle + arcSpan / 2, angle - arcSpan / 2, true);
  ctx.closePath();
  ctx.fillStyle = 'rgba(200, 40, 20, 0.85)';
  ctx.fill();

  const mx = CX + Math.cos(angle) * (R - 12);
  const my = CY + Math.sin(angle) * (R - 12);
  ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#e83020'; ctx.fill();
}

function drawMinuteTicks() {
  // SCALE major ticks (one per minute), 4 sub-ticks between each (every 15s)
  const totalTicks = SCALE * 4;
  for (let i = 0; i < totalTicks; i++) {
    const angle = (i / totalTicks) * Math.PI * 2 - Math.PI / 2;
    const isMin = i % 4 === 0;          // every minute
    const isFive = i % 20 === 0;        // every 5 minutes
    const len = isFive ? 20 : (isMin ? 14 : 7);
    const lw  = isFive ? 3  : (isMin ? 2  : 1);
    const col = isMin  ? '#3a2510' : '#9a8050';

    const x1 = CX + Math.cos(angle) * (R - 2);
    const y1 = CY + Math.sin(angle) * (R - 2);
    const x2 = CX + Math.cos(angle) * (R - 2 - len);
    const y2 = CY + Math.sin(angle) * (R - 2 - len);

    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = col; ctx.lineWidth = lw; ctx.stroke();

    if (isMin) {
      const minLabel = i / 4;
      const tr = R - 2 - len - 13;
      const tx = CX + Math.cos(angle) * tr;
      const ty = CY + Math.sin(angle) * tr;
      ctx.fillStyle = '#2a1808';
      ctx.font = `bold ${isFive ? 18 : 13}px Georgia`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(minLabel), tx, ty);
    }
  }
}

function drawSecondTicks() {
  const rOuter = R * 0.50;
  const rInner = R * 0.43;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const r1 = isMajor ? rOuter : rOuter - 2;
    const r2 = isMajor ? rInner - 2 : rInner + 1;

    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(angle) * r1, CY + Math.sin(angle) * r1);
    ctx.lineTo(CX + Math.cos(angle) * r2, CY + Math.sin(angle) * r2);
    ctx.strokeStyle = isMajor ? '#5a3a18' : '#b89860';
    ctx.lineWidth = isMajor ? 1.5 : 0.8;
    ctx.stroke();

    if (isMajor) {
      const tr = r2 - 9;
      const tx = CX + Math.cos(angle) * tr;
      const ty = CY + Math.sin(angle) * tr;
      ctx.fillStyle = '#5a3a18';
      ctx.font = 'bold 8px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i), tx, ty);
    }
  }
}

function drawHand(angle, length, width, color) {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(angle);
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;
  ctx.beginPath();
  ctx.moveTo(-width / 2, 12);
  ctx.lineTo(-width / 2 * 0.6, -length * 0.85);
  ctx.lineTo(0, -length);
  ctx.lineTo(width / 2 * 0.6, -length * 0.85);
  ctx.lineTo(width / 2, 12);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawSecondHand(angle) {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(angle);
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(-2, 10); ctx.lineTo(-2, 26); ctx.lineTo(2, 26); ctx.lineTo(2, 10);
  ctx.closePath();
  ctx.fillStyle = '#c8503c'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-1.5, 10);
  ctx.lineTo(-1.5, -(R * 0.44));
  ctx.lineTo(1.5, -(R * 0.44));
  ctx.lineTo(1.5, 10);
  ctx.closePath();
  ctx.fillStyle = '#c8503c'; ctx.fill();
  ctx.restore();
}

function tick() {
  if (running) elapsed = Date.now() - startTime;
  drawDial(elapsed);
  document.getElementById('digitalDisplay').textContent = formatTime(elapsed);
  animFrame = requestAnimationFrame(tick);
}

function startStop() {
  if (running) {
    running = false;
    elapsed = Date.now() - startTime;
    document.getElementById('btnStart').textContent = 'Start';
  } else {
    running = true;
    startTime = Date.now() - elapsed;
    document.getElementById('btnStart').textContent = 'Stop';
    if (!animFrame) tick();
  }
}

function reset() {
  running = false;
  elapsed = 0;
  startTime = null;
  document.getElementById('btnStart').textContent = 'Start';
  drawDial(0);
  document.getElementById('digitalDisplay').textContent = '00:00';
  document.getElementById('tagline').textContent = quotes[Math.floor(Math.random() * quotes.length)];
}

document.getElementById('btnStart').addEventListener('click', startStop);
document.getElementById('btnReset').addEventListener('click', reset);
document.getElementById('btnSideStart').addEventListener('click', startStop);
document.getElementById('btnSideReset').addEventListener('click', reset);

tick();

const quotes = [
  "forward motion is sexy",
  "you don't want to send your CV",
  "employers don't want to publish their open roles",
  "you are a STAR",
  "once you can clearly articulate what you want, people will want to help you",
  "can you suggest anybody else I should talk to?",
  "Vielen dank, Frau Schweiger",
  "I help organizations solve X",
  "I am a solutions provider, not a candidate",
  "ATS are shit",
  "all lists are forgettable",
  "the goal is not perfection; the goal is to get comfortable with our imperfections",
  "put on your shoes",
  "do not read",
  "feedback is a gift 🙏",
  "60% of Job Ads are fake",
  "feedback golden ratio: 60% positive / 40% constructive",
  "feedback golden rule: start with your observations. always. immer. toujours",
  "is this role right for me?",
  "be picky, create leverage",
  "set goals, don't waste your time",
];
document.getElementById('tagline').textContent = quotes[Math.floor(Math.random() * quotes.length)];
</script>
</body>
</html>
