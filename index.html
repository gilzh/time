<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Time is for ever</title>
<meta property="og:title" content="Time is for ever" />
<meta property="og:description" content="A vintage mechanical timepiece" />
<meta property="og:image" content="https://gilzh.github.io/time/og-image.png" />
<meta property="og:url" content="https://gilzh.github.io/time/" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://gilzh.github.io/time/og-image.png" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1008;
    background-image: radial-gradient(ellipse at center, #2d1f0e 0%, #0e0804 100%);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    overflow: hidden;
  }

  .watch-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  .page-title {
    color: #c8a96e;
    font-family: 'Georgia', serif;
    font-size: 22px;
    letter-spacing: 3px;
    text-align: center;
    text-transform: uppercase;
    opacity: 0.85;
    line-height: 1.6;
  }
  .page-subtitle {
    color: #8b6914;
    font-family: 'Georgia', serif;
    font-size: 18px;
    font-style: italic;
    letter-spacing: 1px;
    text-align: center;
    opacity: 0.75;
    margin-top: -20px;
    margin-bottom: 16px;
  }

  /* Crown / Start button at top */
  .btn-top {
    position: absolute;
    top: -28px;
    left: 50%;
    transform: translateX(-50%);
    width: 52px;
    height: 28px;
    border-radius: 6px 6px 3px 3px;
    background: linear-gradient(to bottom, #c8a96e, #8b6914, #c8a96e, #7a5c10);
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.7), inset 0 1px 0 rgba(255,255,255,0.2);
    z-index: 10;
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, filter 0.08s ease-out;
  }
  .btn-top::after {
    content: '';
    position: absolute;
    top: 4px; left: 6px; right: 6px; bottom: 4px;
    background: repeating-linear-gradient(
      to right,
      transparent, transparent 4px,
      rgba(0,0,0,0.3) 4px, rgba(0,0,0,0.3) 5px
    );
    border-radius: 3px;
    pointer-events: none;
  }
  .btn-top:active {
    transform: translateX(-50%) translateY(7px) scaleY(0.88);
    box-shadow: 0 0 2px rgba(0,0,0,0.9), inset 0 3px 7px rgba(0,0,0,0.6);
    filter: brightness(0.72);
  }

  /* Side Reset button */
  .side-buttons {
    position: absolute;
    right: -22px;
    top: 50%;
    transform: translateY(-50%);
  }
  .btn-side {
    width: 26px;
    height: 40px;
    background: linear-gradient(to right, #b8922e, #8b6914, #c8a96e);
    border-radius: 6px;
    border: none;
    cursor: pointer;
    box-shadow: 4px 3px 8px rgba(0,0,0,0.6), inset -1px 0 0 rgba(255,255,255,0.15);
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out, filter 0.08s ease-out;
  }
  .btn-side:active {
    transform: translateX(9px) scaleX(0.88);
    box-shadow: 0 1px 2px rgba(0,0,0,0.9), inset 4px 0 8px rgba(0,0,0,0.6);
    filter: brightness(0.68);
  }

  /* Outer case */
  .watch-outer {
    position: relative;
    width: 336px;
    height: 336px;
    border-radius: 50%;
    background: linear-gradient(145deg, #d4aa50 0%, #8b6914 30%, #c8a030 55%, #7a5c10 75%, #b8922e 100%);
    box-shadow:
      0 0 0 4px #5a4010,
      0 12px 50px rgba(0,0,0,0.85),
      0 4px 12px rgba(0,0,0,0.5),
      inset 0 3px 6px rgba(255,220,100,0.3),
      inset 0 -3px 6px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .watch-outer::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 3px solid rgba(100, 70, 10, 0.8);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
  }

  /* Inner bezel */
  .watch-bezel {
    position: relative;
    width: 308px;
    height: 308px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 50%, #0e0804 100%);
    box-shadow:
      inset 0 6px 16px rgba(0,0,0,0.9),
      inset 0 -3px 8px rgba(0,0,0,0.6),
      0 0 0 3px #5a4010;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Dial face */
  .watch-face {
    position: relative;
    width: 270px;
    height: 270px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 40% 35%, rgba(255,245,220,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at center, #f5edd8 0%, #e8d9b8 40%, #d4c090 70%, #c8aa70 100%);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), inset 0 -2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .watch-face::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,200,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    border-radius: 50%;
  }

  /* Digital readout */
  .digital-display {
    position: absolute;
    bottom: 68px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(20, 12, 4, 0.88);
    border: 1.5px solid #8b6914;
    border-radius: 6px;
    padding: 5px 14px;
    color: #d4aa50;
    font-family: 'Courier New', monospace;
    font-size: 26px;
    font-weight: bold;
    letter-spacing: 3px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.8);
    white-space: nowrap;
    z-index: 10;
  }

  /* Brand */
  .brand {
    position: absolute;
    top: 76px;
    width: 100%;
    text-align: center;
    font-size: 14px;
    letter-spacing: 6px;
    color: #8b6914;
    font-family: 'Georgia', serif;
    text-transform: uppercase;
    z-index: 10;
  }

  .scale-links {
    display: flex;
    gap: 24px;
  }
  .scale-link {
    color: #5a4010;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.15s, color 0.15s;
  }
  .scale-link:hover { opacity: 1; color: #8b6914; }
  .scale-link.active { color: #c8a96e; opacity: 1; }

  .footer-link {
    color: #5a4010;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-decoration: none;
    opacity: 0.7;
  }
  .footer-link:hover { opacity: 1; color: #8b6914; }

  .clock-watch-outer {
    position: relative;
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: linear-gradient(145deg, #d4aa50 0%, #8b6914 30%, #c8a030 55%, #7a5c10 75%, #b8922e 100%);
    box-shadow:
      0 0 0 4px #5a4010,
      0 12px 50px rgba(0,0,0,0.85),
      0 4px 12px rgba(0,0,0,0.5),
      inset 0 3px 6px rgba(255,220,100,0.3),
      inset 0 -3px 6px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .clock-watch-outer::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 3px solid rgba(100, 70, 10, 0.8);
    box-shadow: inset 0 0 12px rgba(0,0,0,0.5);
  }
  .clock-bezel {
    position: relative;
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1008 0%, #2d1f0e 50%, #0e0804 100%);
    box-shadow:
      inset 0 6px 16px rgba(0,0,0,0.9),
      inset 0 -3px 8px rgba(0,0,0,0.6),
      0 0 0 3px #5a4010;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .clock-face {
    position: relative;
    width: 176px;
    height: 176px;
    border-radius: 50%;
    background:
      radial-gradient(ellipse at 40% 35%, rgba(255,245,220,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at center, #f5edd8 0%, #e8d9b8 40%, #d4c090 70%, #c8aa70 100%);
    box-shadow: inset 0 3px 10px rgba(0,0,0,0.3), inset 0 -2px 6px rgba(0,0,0,0.2);
    overflow: hidden;
  }
  .clock-face::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: radial-gradient(ellipse at 30% 30%, rgba(255,255,200,0.12) 0%, transparent 50%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="watch-container">
  <h1 class="page-title" id="pageTitle">Alicia &amp; Alice Timepiece</h1>
  <p class="page-subtitle" id="tagline"></p>
  <div id="stopwatchWatch" class="watch-outer">
    <button class="btn-top" id="btnSideReset" title="Reset"></button>
    <div class="side-buttons">
      <button class="btn-side" id="btnSideStart" title="Start/Stop"></button>
    </div>
    <div class="watch-bezel">
      <div class="watch-face">
        <canvas id="dialCanvas" width="270" height="270"></canvas>
        <div class="digital-display" id="digitalDisplay">00:00</div>
      </div>
    </div>
  </div>

  <div id="clockWatch" class="clock-watch-outer" style="display:none">
    <div class="clock-bezel">
      <div class="clock-face">
        <canvas id="clockCanvas" width="176" height="176"></canvas>
        <div class="digital-display" id="clockDisplay" style="font-size:18px;bottom:44px;letter-spacing:2px;">00:00:00</div>
      </div>
    </div>
  </div>

  <div class="scale-links">
    <a href="#6"  class="scale-link" data-scale="6">6 min</a>
    <a href="#12" class="scale-link" data-scale="12">12 min</a>
    <a href="#60" class="scale-link" data-scale="60">60 min</a>
    <a href="#clock" class="scale-link" id="clockLink">clock</a>
  </div>

  <input id="limitInput" type="hidden" value="2" />

  <a class="footer-link" href="https://gilzh.github.io" target="_blank">gilzh.github.io</a>
</div>

<script>
const canvas = document.getElementById('dialCanvas');
const ctx = canvas.getContext('2d');
const CX = 135, CY = 135, R = 124;

let startTime = null;
let elapsed = 0;
let running = false;
let animFrame = null;
let limitMin = 2;

const SCALE_CONFIG = {
  6:  { boldEveryMin: 3,  labelEveryMin: 1,  subTicks: 4, defaultTarget: 2  },
  12: { boldEveryMin: 3,  labelEveryMin: 1,  subTicks: 4, defaultTarget: 3  },
  60: { boldEveryMin: 5,  labelEveryMin: 15, subTicks: 1, defaultTarget: 15 },
};

let SCALE = 6;

function showStopwatch() {
  document.getElementById('stopwatchWatch').style.display = '';
  document.getElementById('clockWatch').style.display = 'none';
}

function showClock() {
  document.getElementById('stopwatchWatch').style.display = 'none';
  document.getElementById('clockWatch').style.display = '';
  document.querySelectorAll('.scale-link').forEach(el => el.classList.remove('active'));
  document.getElementById('clockLink').classList.add('active');
  history.replaceState(null, '', '#clock');
}

function applyScale(s) {
  SCALE = s;
  const cfg = SCALE_CONFIG[s];
  limitMin = cfg.defaultTarget;
  document.getElementById('limitInput').value = cfg.defaultTarget;
  document.querySelectorAll('.scale-link').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.scale) === s);
  });
  showStopwatch();
  reset();
}

document.querySelectorAll('.scale-link[data-scale]').forEach(el => {
  el.addEventListener('click', e => {
    e.preventDefault();
    applyScale(parseInt(el.dataset.scale));
    history.replaceState(null, '', el.getAttribute('href'));
  });
});

document.getElementById('clockLink').addEventListener('click', e => {
  e.preventDefault();
  showClock();
});

document.getElementById('limitInput').addEventListener('input', function() {
  const v = parseInt(this.value);
  limitMin = (v >= 1 && v <= SCALE) ? v : null;
  drawDial(elapsed);
});

function formatTime(ms) {
  const s = Math.floor(ms / 1000) % 60;
  const m = Math.floor(ms / 60000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function drawDial(ms) {
  ctx.clearRect(0, 0, 270, 270);

  const totalMin = ms / 60000;
  const totalSec = ms / 1000;

  // Background scale number
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.fillStyle = '#3a2510';
  ctx.font = 'bold 180px Georgia';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(SCALE), CX, CY);
  ctx.restore();

  if (limitMin !== null) drawLimitMarker(limitMin);

  drawMinuteTicks();
  drawSecondTicks();

  // Minute hand — full sweep = SCALE minutes
  const minAngle = (totalMin % SCALE) / SCALE * Math.PI * 2;
  drawHand(minAngle, R * 0.62, 9, '#1a0e04');

  // Second hand
  const secAngle = (totalSec % 60) / 60 * Math.PI * 2;
  drawSecondHand(secAngle);

  // Center jewel
  ctx.beginPath(); ctx.arc(CX, CY, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#c8a96e'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX, CY, 4.5, 0, Math.PI * 2);
  ctx.fillStyle = '#8b6914'; ctx.fill();
  ctx.beginPath(); ctx.arc(CX, CY, 2, 0, Math.PI * 2);
  ctx.fillStyle = '#ffd060'; ctx.fill();
}

function drawLimitMarker(min) {
  // clamp to scale
  const clamped = Math.min(min, SCALE);
  const angle = (clamped / SCALE) * Math.PI * 2 - Math.PI / 2;
  const arcSpan = (0.5 / SCALE) * Math.PI * 2;

  ctx.beginPath();
  ctx.arc(CX, CY, R - 5, angle - arcSpan / 2, angle + arcSpan / 2);
  ctx.arc(CX, CY, R - 20, angle + arcSpan / 2, angle - arcSpan / 2, true);
  ctx.closePath();
  ctx.fillStyle = 'rgba(200, 40, 20, 0.85)';
  ctx.fill();

  const mx = CX + Math.cos(angle) * (R - 12);
  const my = CY + Math.sin(angle) * (R - 12);
  ctx.beginPath(); ctx.arc(mx, my, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#e83020'; ctx.fill();
}

function drawMinuteTicks() {
  const cfg = SCALE_CONFIG[SCALE];
  const totalTicks = SCALE * cfg.subTicks;
  const boldEveryTicks  = cfg.boldEveryMin  * cfg.subTicks;
  const labelEveryTicks = cfg.labelEveryMin * cfg.subTicks;
  for (let i = 0; i < totalTicks; i++) {
    const angle = (i / totalTicks) * Math.PI * 2 - Math.PI / 2;
    const isMin   = i % cfg.subTicks === 0;
    const isBold  = i % boldEveryTicks  === 0;
    const isLabel = i % labelEveryTicks === 0;
    const len = isBold ? 20 : (isMin ? 14 : 7);
    const lw  = isBold ? 3  : (isMin ? 2  : 1);

    const x1 = CX + Math.cos(angle) * (R - 2);
    const y1 = CY + Math.sin(angle) * (R - 2);
    const x2 = CX + Math.cos(angle) * (R - 2 - len);
    const y2 = CY + Math.sin(angle) * (R - 2 - len);

    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
    ctx.strokeStyle = isMin ? '#3a2510' : '#9a8050';
    ctx.lineWidth = lw; ctx.stroke();

    if (isLabel) {
      const minLabel = i / cfg.subTicks;
      const tr = R - 2 - len - 13;
      const tx = CX + Math.cos(angle) * tr;
      const ty = CY + Math.sin(angle) * tr;
      ctx.fillStyle = '#2a1808';
      ctx.font = `bold ${isBold ? 18 : 13}px Georgia`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(minLabel), tx, ty);
    }
  }
}

function drawSecondTicks() {
  const rOuter = R * 0.50;
  const rInner = R * 0.43;
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMajor = i % 5 === 0;
    const r1 = isMajor ? rOuter : rOuter - 2;
    const r2 = isMajor ? rInner - 2 : rInner + 1;

    ctx.beginPath();
    ctx.moveTo(CX + Math.cos(angle) * r1, CY + Math.sin(angle) * r1);
    ctx.lineTo(CX + Math.cos(angle) * r2, CY + Math.sin(angle) * r2);
    ctx.strokeStyle = isMajor ? '#5a3a18' : '#b89860';
    ctx.lineWidth = isMajor ? 1.5 : 0.8;
    ctx.stroke();

    if (isMajor) {
      const tr = r2 - 9;
      const tx = CX + Math.cos(angle) * tr;
      const ty = CY + Math.sin(angle) * tr;
      ctx.fillStyle = '#5a3a18';
      ctx.font = 'bold 8px Georgia';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(String(i), tx, ty);
    }
  }
}

function drawHand(angle, length, width, color) {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(angle);
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 6;
  ctx.shadowOffsetY = 3;
  ctx.beginPath();
  ctx.moveTo(-width / 2, 12);
  ctx.lineTo(-width / 2 * 0.6, -length * 0.85);
  ctx.lineTo(0, -length);
  ctx.lineTo(width / 2 * 0.6, -length * 0.85);
  ctx.lineTo(width / 2, 12);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function drawSecondHand(angle) {
  ctx.save();
  ctx.translate(CX, CY);
  ctx.rotate(angle);
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.moveTo(-2, 10); ctx.lineTo(-2, 26); ctx.lineTo(2, 26); ctx.lineTo(2, 10);
  ctx.closePath();
  ctx.fillStyle = '#c8503c'; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-1.5, 10);
  ctx.lineTo(-1.5, -(R * 0.44));
  ctx.lineTo(1.5, -(R * 0.44));
  ctx.lineTo(1.5, 10);
  ctx.closePath();
  ctx.fillStyle = '#c8503c'; ctx.fill();
  ctx.restore();
}

let sharedAC = null;
function getAC() {
  if (!sharedAC) sharedAC = new (window.AudioContext || window.webkitAudioContext)();
  if (sharedAC.state === 'suspended') sharedAC.resume();
  return sharedAC;
}

function playBell() {
  const ac = getAC();
  [[1, 0.6], [2.76, 0.25], [5.4, 0.1], [8.93, 0.05]].forEach(([ratio, gain]) => {
    const osc = ac.createOscillator();
    const g = ac.createGain();
    osc.frequency.value = 520 * ratio;
    osc.type = 'sine';
    g.gain.setValueAtTime(gain, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 2.8);
    osc.connect(g); g.connect(ac.destination);
    osc.start(); osc.stop(ac.currentTime + 2.8);
  });
}

let bellRung = false;

function tick() {
  if (running) elapsed = Date.now() - startTime;
  drawDial(elapsed);
  document.getElementById('digitalDisplay').textContent = formatTime(elapsed);
  if (running && limitMin !== null && !bellRung && elapsed >= limitMin * 60000) {
    playBell();
    bellRung = true;
  }
  animFrame = requestAnimationFrame(tick);
}

function startStop() {
  if (running) {
    running = false;
    elapsed = Date.now() - startTime;
  } else {
    running = true;
    startTime = Date.now() - elapsed;
    if (!animFrame) tick();
  }
}

function reset() {
  running = false;
  elapsed = 0;
  startTime = null;
  bellRung = false;
  drawDial(0);
  document.getElementById('digitalDisplay').textContent = '00:00';
  document.getElementById('tagline').textContent = quotes[Math.floor(Math.random() * quotes.length)];
}

function playClick(type) {
  const ac = getAC();
  if (type === 'reset') {
    // Two-stage thunk: initial transient + low body
    [0, 0.045].forEach((delay, i) => {
      const dur = i === 0 ? 0.07 : 0.12;
      const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / data.length, i === 0 ? 5 : 2);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const gain = ac.createGain();
      const t = ac.currentTime + delay;
      gain.gain.setValueAtTime(i === 0 ? 0.4 : 0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      const filter = ac.createBiquadFilter();
      filter.type = 'lowpass';
      filter.frequency.value = i === 0 ? 4000 : 900;
      src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
      src.start(t);
    });
  } else {
    // Short crisp snap
    const buf = ac.createBuffer(1, ac.sampleRate * 0.03, ac.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 10);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const gain = ac.createGain();
    gain.gain.setValueAtTime(0.35, 0);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.03);
    const filter = ac.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 2000;
    src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
    src.start();
  }
}

document.getElementById('btnSideStart').addEventListener('click', () => { playClick('start'); startStop(); });
document.getElementById('btnSideReset').addEventListener('click', () => { playClick('reset'); reset(); });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    playClick('start'); startStop();
  }
});

// Tap a minute mark on the dial to set Target
function handleDialTap(e) {
  const rect = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  const x = (clientX - rect.left) * (canvas.width / rect.width) - CX;
  const y = (clientY - rect.top)  * (canvas.height / rect.height) - CY;
  const dist = Math.sqrt(x * x + y * y);

  // Only respond to taps in the outer minute-ring area
  if (dist < R * 0.55 || dist > R) return;

  // Convert tap position to angle, then to minutes
  let angle = Math.atan2(y, x) + Math.PI / 2;
  if (angle < 0) angle += Math.PI * 2;
  const min = Math.round(angle / (Math.PI * 2) * SCALE);
  const clamped = Math.max(1, Math.min(SCALE, min === 0 ? SCALE : min));

  limitMin = clamped;
  bellRung = elapsed >= limitMin * 60000;
  document.getElementById('limitInput').value = clamped;
  drawDial(elapsed);
}

canvas.addEventListener('click', handleDialTap);
canvas.addEventListener('touchstart', e => { e.preventDefault(); handleDialTap(e); }, { passive: false });

// --- Analog clock ---
const clockCanvas = document.getElementById('clockCanvas');
const cc = clockCanvas.getContext('2d');
const CCX = 88, CCY = 88, CR = 80;

function drawClock() {
  cc.clearRect(0, 0, 176, 176);
  const now = new Date();
  const timeStr = now.toLocaleTimeString('fr-FR', { timeZone: 'Europe/Paris', hour12: false });
  const [h, m, s] = timeStr.split(':').map(Number);
  document.getElementById('clockDisplay').textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const hr  = h % 12 + m / 60;
  const min = m + s / 60;
  const sec = s + now.getMilliseconds() / 1000;

  // Hour ticks & numbers
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const bold = true;
    const len = 14;
    cc.beginPath();
    cc.moveTo(CCX + Math.cos(a) * (CR - 2), CCY + Math.sin(a) * (CR - 2));
    cc.lineTo(CCX + Math.cos(a) * (CR - 2 - len), CCY + Math.sin(a) * (CR - 2 - len));
    cc.strokeStyle = '#3a2510'; cc.lineWidth = 2.5; cc.stroke();
    const tr = CR - 2 - len - 9;
    cc.fillStyle = '#2a1808';
    cc.font = 'bold 11px Georgia';
    cc.textAlign = 'center'; cc.textBaseline = 'middle';
    cc.fillText(String(i === 0 ? 12 : i), CCX + Math.cos(a) * tr, CCY + Math.sin(a) * tr);
  }
  // Minute ticks
  for (let i = 0; i < 60; i++) {
    if (i % 5 === 0) continue;
    const a = (i / 60) * Math.PI * 2 - Math.PI / 2;
    cc.beginPath();
    cc.moveTo(CCX + Math.cos(a) * (CR - 2), CCY + Math.sin(a) * (CR - 2));
    cc.lineTo(CCX + Math.cos(a) * (CR - 9), CCY + Math.sin(a) * (CR - 9));
    cc.strokeStyle = '#9a8050'; cc.lineWidth = 0.8; cc.stroke();
  }

  // Hour hand
  const hAngle = (hr / 12) * Math.PI * 2;
  drawClockHand(hAngle, CR * 0.48, 6, '#1a0e04');
  // Minute hand
  const mAngle = (min / 60) * Math.PI * 2;
  drawClockHand(mAngle, CR * 0.68, 4, '#1a0e04');
  // Second hand
  const sAngle = (sec / 60) * Math.PI * 2;
  cc.save(); cc.translate(CCX, CCY); cc.rotate(sAngle);
  cc.beginPath(); cc.moveTo(-1.2, 10); cc.lineTo(-1.2, -(CR * 0.72)); cc.lineTo(1.2, -(CR * 0.72)); cc.lineTo(1.2, 10);
  cc.closePath(); cc.fillStyle = '#c8503c'; cc.fill();
  cc.beginPath(); cc.moveTo(-2, 10); cc.lineTo(-2, 18); cc.lineTo(2, 18); cc.lineTo(2, 10);
  cc.closePath(); cc.fillStyle = '#c8503c'; cc.fill();
  cc.restore();

  // Centre jewel
  cc.beginPath(); cc.arc(CCX, CCY, 5, 0, Math.PI * 2); cc.fillStyle = '#c8a96e'; cc.fill();
  cc.beginPath(); cc.arc(CCX, CCY, 3, 0, Math.PI * 2); cc.fillStyle = '#8b6914'; cc.fill();
  cc.beginPath(); cc.arc(CCX, CCY, 1.5, 0, Math.PI * 2); cc.fillStyle = '#ffd060'; cc.fill();

  requestAnimationFrame(drawClock);
}

function drawClockHand(angle, length, width, color) {
  cc.save(); cc.translate(CCX, CCY); cc.rotate(angle);
  cc.shadowColor = 'rgba(0,0,0,0.5)'; cc.shadowBlur = 4; cc.shadowOffsetY = 2;
  cc.beginPath();
  cc.moveTo(-width / 2, 8);
  cc.lineTo(-width / 2 * 0.6, -length * 0.85);
  cc.lineTo(0, -length);
  cc.lineTo(width / 2 * 0.6, -length * 0.85);
  cc.lineTo(width / 2, 8);
  cc.closePath(); cc.fillStyle = color; cc.fill();
  cc.restore();
}
